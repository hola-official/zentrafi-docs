<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="primaryGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#004581" />
      <stop offset="100%" stop-color="#018ABD" />
    </linearGradient>
    
    <linearGradient id="secondaryGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#018ABD" />
      <stop offset="100%" stop-color="#97CBDC" />
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#97CBDC" />
    </linearGradient>
    
    <!-- Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Logo Icon -->
  <g transform="translate(30, 30)">
    <!-- Outer glow effect -->
    <circle cx="70" cy="70" r="75" fill="url(#primaryGradient)" opacity="0.3" filter="url(#outerGlow)" />
    
    <!-- Dark background circle -->
    <circle cx="70" cy="70" r="70" fill="#0a0f1a" opacity="0.8" />
    
    <!-- Outer ring -->
    <circle cx="70" cy="70" r="60" stroke="url(#primaryGradient)" stroke-width="5" fill="none" />
    
    <!-- Z shape -->
    <path 
      d="M 35 35 L 105 35 L 35 105 L 105 105" 
      stroke="url(#secondaryGradient)" 
      stroke-width="10" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
      fill="none"
      filter="url(#glow)"
    />
    
    <!-- Left swap arrow -->
    <path 
      d="M 42 55 L 25 70 L 42 85" 
      stroke="url(#primaryGradient)" 
      stroke-width="5" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
      fill="none"
      opacity="0.8"
    />
    
    <!-- Right swap arrow -->
    <path 
      d="M 98 55 L 115 70 L 98 85" 
      stroke="url(#primaryGradient)" 
      stroke-width="5" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
      fill="none"
      opacity="0.8"
    />
    
    <!-- Center dot -->
    <circle cx="70" cy="70" r="8" fill="url(#secondaryGradient)" />
  </g>
  
  <!-- Text -->
  <g transform="translate(200, 100)">
    <text 
      x="0" 
      y="0" 
      font-family="Arial, sans-serif" 
      font-size="48" 
      font-weight="bold" 
      fill="url(#textGradient)"
      dominant-baseline="middle"
    >
      ZentraFi
    </text>
  </g>
</svg>
